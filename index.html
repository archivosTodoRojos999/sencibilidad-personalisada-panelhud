<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Auto de Carrera</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }
    canvas {
        display: block;
        margin: auto;
        background: black;
    }
</style>
</head>
<body>

<canvas id="juego" width="800" height="600"></canvas>

<script>
// ================== CÓDIGO ORIGINAL (NO BORRADO) ==================

// ================================================================

// Configuración
const canvas = document.getElementById("juego");
const ctx = canvas.getContext("2d");

const ANCHO = 800;
const ALTO = 600;

// Colores
const NEGRO = "black";
const ROJO = "red";

// Auto
let auto_ancho = 50;
let auto_alto = 80;
let x = ANCHO / 2 - auto_ancho / 2;
let y = ALTO - auto_alto - 10;
let velocidad = 5;

// Controles
let teclas = {};

document.addEventListener("keydown", (e) => {
    teclas[e.key] = true;
});

document.addEventListener("keyup", (e) => {
    teclas[e.key] = false;
});

// Bucle del juego
function juego() {

    // Movimiento
    if (teclas["ArrowLeft"] && x > 0) x -= velocidad;
    if (teclas["ArrowRight"] && x < ANCHO - auto_ancho) x += velocidad;
    if (teclas["ArrowUp"] && y > 0) y -= velocidad;
    if (teclas["ArrowDown"] && y < ALTO - auto_alto) y += velocidad;

    // Dibujar
    ctx.fillStyle = NEGRO;
    ctx.fillRect(0, 0, ANCHO, ALTO);

    ctx.fillStyle = ROJO;
    ctx.fillRect(x, y, auto_ancho, auto_alto);

    requestAnimationFrame(juego);
}

// Iniciar juego
juego();
</script>

</body>
</html>
