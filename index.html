<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cienpiés realista</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}
canvas{display:block;}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = {x:canvas.width/2,y:canvas.height/2};

document.addEventListener("mousemove",e=>{
mouse.x = e.clientX;
mouse.y = e.clientY;
});

const segments = 120;
let body = [];

for(let i=0;i<segments;i++){
body.push({x:canvas.width/2,y:canvas.height/2});
}

let hue = 0;

function update(){

body[0].x += (mouse.x-body[0].x)*0.15;
body[0].y += (mouse.y-body[0].y)*0.15;

for(let i=1;i<body.length;i++){

body[i].x += (body[i-1].x-body[i].x)*0.35;
body[i].y += (body[i-1].y-body[i].y)*0.35;

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

hue+=1;
let color = `hsl(${hue},100%,50%)`;

ctx.strokeStyle=color;
ctx.shadowColor=color;
ctx.shadowBlur=8;
ctx.lineWidth=2;

for(let i=1;i<body.length;i++){

let p = body[i];
let prev = body[i-1];

let angle = Math.atan2(prev.y-p.y,prev.x-p.x);

let rib = 12;

let lx = p.x + Math.cos(angle+Math.PI/2)*rib;
let ly = p.y + Math.sin(angle+Math.PI/2)*rib;

let rx = p.x + Math.cos(angle-Math.PI/2)*rib;
let ry = p.y + Math.sin(angle-Math.PI/2)*rib;

ctx.beginPath();
ctx.moveTo(lx,ly);
ctx.lineTo(rx,ry);
ctx.stroke();

if(i%3==0){

let leg = 25;

let llx = lx + Math.cos(angle+Math.PI/2)*leg;
let lly = ly + Math.sin(angle+Math.PI/2)*leg;

let rlx = rx + Math.cos(angle-Math.PI/2)*leg;
let rly = ry + Math.sin(angle-Math.PI/2)*leg;

ctx.beginPath();
ctx.moveTo(lx,ly);
ctx.lineTo(llx,lly);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(rx,ry);
ctx.lineTo(rlx,rly);
ctx.stroke();

}

}

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
