<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- Sin zoom en celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Senci de Salita</title>

  <style>
    body {
      margin: 0;
      font-family: monospace;
      color: #a855f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: black;
      overflow: hidden;
    }

    /* Fondo animado */
    #bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* Caja */
    .box {
      border: 2px solid #a855f7;
      padding: 20px;
      width: 90%;
      max-width: 340px;
      text-align: center;
      background: rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 10px #a855f7, 0 0 30px #9333ea, 0 0 60px #7e22ce;
      border-radius: 10px;
    }

    /* Input y botón */
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: black;
      color: #a855f7;
      border: 1px solid #a855f7;
      box-sizing: border-box;
      font-size: 16px;
    }

    button:hover {
      background: #a855f7;
      color: black;
    }

    /* Botones de sensi */
    .sensi-buttons {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .sensi-buttons button {
      width: 100%;
    }

    .sensi-buttons button.active {
      background: #a855f7;
      color: black;
    }

    /* 🔥 FIX TEXTO (NO SE SALE) */
    #sens {
      margin-top: 10px;
      font-size: 13px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      text-align: left;
    }

    #headshot {
      margin-top: 10px;
      border: 1px solid #a855f7;
      padding: 8px;
      box-shadow: 0 0 10px #a855f7;
      font-size: 13px;
      word-wrap: break-word;
    }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">
  <h2>🎯 SENCI DE SALITA</h2>

  <input id="device" placeholder="Ej: Samsung A51, iPhone 11">

  <div id="sensi-options" class="sensi-buttons" style="display:none;">
    <button id="high-sensi">SENSI ALTA</button>
    <button id="low-sensi">SENSI BAJA</button>
  </div>

  <button id="btn">GENERAR SENCI</button>

  <p id="error" style="color:red;"></p>

  <div id="sens"></div>
  <div id="headshot"></div>
</div>

<script>
let sensMode = '';

const deviceInput = document.getElementById("device");
const sensiOptions = document.getElementById("sensi-options");

deviceInput.addEventListener("input", () => {
  if (deviceInput.value.trim() !== "") {
    sensiOptions.style.display = "flex";
  } else {
    sensiOptions.style.display = "none";
    sensMode = '';
  }
});

const highBtn = document.getElementById("high-sensi");
const lowBtn = document.getElementById("low-sensi");

highBtn.onclick = () => {
  sensMode = "high";
  highBtn.classList.add("active");
  lowBtn.classList.remove("active");
};

lowBtn.onclick = () => {
  sensMode = "low";
  lowBtn.classList.add("active");
  highBtn.classList.remove("active");
};

document.getElementById("btn").onclick = () => {
  const device = deviceInput.value;
  const error = document.getElementById("error");
  const sensDiv = document.getElementById("sens");
  const headshotDiv = document.getElementById("headshot");

  if (!device.trim()) {
    error.textContent = "Escribe tu dispositivo";
    sensDiv.innerHTML = "";
    headshotDiv.innerHTML = "";
    return;
  }

  if (sensMode === '') {
    error.textContent = "Elige Sensi Alta o Baja";
    sensDiv.innerHTML = "";
    headshotDiv.innerHTML = "";
    return;
  }

  error.textContent = "";

  let hash = 0;
  for (let i = 0; i < device.length; i++) {
    hash = device.charCodeAt(i) + ((hash << 5) - hash);
  }

  const base = Math.abs(hash);

  function calc(min, max, factor) {
    let mid = (min + max) / 2;
    let variation = (base % factor) - (factor / 2);
    let value = mid + variation * 0.5;
    return Math.round(Math.max(min, Math.min(value, max)));
  }

  let boost = sensMode === "high" ? 1.1 : 0.9;

  const sens = {
    general: calc(140, 190, 40) * boost,
    redDot: calc(110, 170, 30) * boost,
    x2: calc(100, 160, 25) * boost,
    x4: calc(90, 150, 20) * boost,
    sniper: calc(80, 140, 15) * boost,
    freeLook: calc(130, 190, 50) * boost
  };

  for (let key in sens) {
    sens[key] = Math.round(sens[key]);
  }

  sensDiv.innerHTML = `
GENERAL: ${sens.general}<br>
PUNTO ROJO: ${sens.redDot}<br>
MIRA X2: ${sens.x2}<br>
MIRA X4: ${sens.x4}<br>
FRANCOTIRADOR: ${sens.sniper}<br>
CAMARA 360: ${sens.freeLook}
`;

  let precision = Math.floor((sens.general + sens.redDot + sens.freeLook) / 5);
  if (precision < 99) precision = 99;
  if (precision > 100) precision = 100;

  headshotDiv.innerHTML = "🎯 HEADSHOT: " + precision + "%";
};

// Fondo animado
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

let lines = [];

for (let i = 0; i < 35; i++) {
  lines.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    length: Math.random() * 150,
    angle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.03 + 0.01
  });
}

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "#d400ff";
  ctx.shadowColor = "#d400ff";
  ctx.shadowBlur = 15;

  lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(
      l.x + Math.cos(l.angle) * l.length,
      l.y + Math.sin(l.angle) * l.length
    );
    ctx.stroke();

    l.angle += l.speed;
    l.x += Math.cos(l.angle);
    l.y += Math.sin(l.angle);

    if (l.x < 0 || l.x > canvas.width || l.y < 0 || l.y > canvas.height) {
      l.x = Math.random() * canvas.width;
      l.y = Math.random() * canvas.height;
    }
  });

  requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize", resize);
</script>

</body>
</html>
