<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Piano PRO</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #111;
    color: white;
}

h1 {
    margin-top: 20px;
}

/* CONTENEDOR */
.piano {
    position: relative;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

/* TECLAS BLANCAS */
.tecla {
    width: 60px;
    height: 220px;
    background: white;
    border: 1px solid black;
    cursor: pointer;
}

.tecla:active {
    background: #ddd;
}

/* TECLAS NEGRAS */
.negra {
    width: 40px;
    height: 140px;
    background: black;
    position: absolute;
    z-index: 2;
    cursor: pointer;
}

.negra:active {
    background: #444;
}

/* POSICIONES */
#csharp { left: 155px; }
#dsharp { left: 215px; }
#fsharp { left: 335px; }
#gsharp { left: 395px; }
#asharp { left: 455px; }

button {
    margin: 10px;
    padding: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>🎹 Piano PRO</h1>
<p>Teclado: A S D F G H J + W E T Y U</p>

<button onclick="empezarGrabacion()">🔴 Grabar</button>
<button onclick="reproducir()">▶️ Reproducir</button>

<div class="piano">
    <!-- BLANCAS -->
    <div class="tecla" onclick="tocar('C')"></div>
    <div class="tecla" onclick="tocar('D')"></div>
    <div class="tecla" onclick="tocar('E')"></div>
    <div class="tecla" onclick="tocar('F')"></div>
    <div class="tecla" onclick="tocar('G')"></div>
    <div class="tecla" onclick="tocar('A')"></div>
    <div class="tecla" onclick="tocar('B')"></div>

    <!-- NEGRAS -->
    <div class="negra" id="csharp" onclick="tocar('C#')"></div>
    <div class="negra" id="dsharp" onclick="tocar('D#')"></div>
    <div class="negra" id="fsharp" onclick="tocar('F#')"></div>
    <div class="negra" id="gsharp" onclick="tocar('G#')"></div>
    <div class="negra" id="asharp" onclick="tocar('A#')"></div>
</div>

<script>
let grabando = false;
let grabacion = [];
let inicioTiempo = 0;

// SONIDO REAL
function tocar(nota) {
    const sonidos = {
        "C": "C.mp3",
        "C#": "Csharp.mp3",
        "D": "D.mp3",
        "D#": "Dsharp.mp3",
        "E": "E.mp3",
        "F": "F.mp3",
        "F#": "Fsharp.mp3",
        "G": "G.mp3",
        "G#": "Gsharp.mp3",
        "A": "A.mp3",
        "A#": "Asharp.mp3",
        "B": "B.mp3"
    };

    const audio = new Audio(sonidos[nota]);
    audio.currentTime = 0;
    audio.play();

    // GRABAR
    if (grabando) {
        grabacion.push({
            nota: nota,
            tiempo: Date.now() - inicioTiempo
        });
    }
}

// GRABAR
function empezarGrabacion() {
    grabacion = [];
    grabando = true;
    inicioTiempo = Date.now();
    alert("Grabando...");
}

// REPRODUCIR
function reproducir() {
    grabando = false;

    grabacion.forEach(nota => {
        setTimeout(() => {
            tocar(nota.nota);
        }, nota.tiempo);
    });
}

// TECLADO
document.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();

    if (k === "a") tocar("C");
    if (k === "w") tocar("C#");
    if (k === "s") tocar("D");
    if (k === "e") tocar("D#");
    if (k === "d") tocar("E");
    if (k === "f") tocar("F");
    if (k === "t") tocar("F#");
    if (k === "g") tocar("G");
    if (k === "y") tocar("G#");
    if (k === "h") tocar("A");
    if (k === "u") tocar("A#");
    if (k === "j") tocar("B");
});
</script>

</body>
</html>
