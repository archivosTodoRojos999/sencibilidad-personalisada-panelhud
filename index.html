<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SENCI PRO SALITA</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.panel{
position:relative;
z-index:2;
width:90%;
max-width:350px;
margin:80px auto;
padding:15px;
border:2px solid #00eaff;
box-shadow:0 0 20px #00eaff;
color:#00eaff;
background:#000;
}

input{
width:100%;
padding:10px;
margin:5px 0;
background:#000;
border:1px solid #00eaff;
color:#00eaff;
}

button{
width:32%;
padding:10px;
margin:5px 1%;
background:#000;
border:1px solid #00eaff;
color:#00eaff;
cursor:pointer;
transition:0.3s;
}

button:active{
background:#00eaff;
color:#000;
}

/* BOTON DRAG */
.dragBtn{
width:100%;
border-color:red;
color:red;
}

/* RESULTADO */
#resultado{
margin-top:10px;
padding:10px;
border:1px solid #00eaff;
max-height:250px;
overflow:auto;
font-size:13px;
line-height:1.6;
}

/* BOTON VIP */
#vipBtn{
position:fixed;
top:50%;
right:10px;
transform:translateY(-50%);
width:65px;
height:65px;
border-radius:50%;
background:#000;
color:#FFD700;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
border:2px solid #FFD700;
box-shadow:0 0 10px #FFD700,0 0 30px #FFD700;
cursor:pointer;
z-index:9999;
animation:brilloVIP 2s infinite;
}

@keyframes brilloVIP{
0%{box-shadow:0 0 10px #FFD700;}
50%{box-shadow:0 0 40px #FFD700;}
100%{box-shadow:0 0 10px #FFD700;}
}

/* VIP FULL */
#panelVIP{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:red;
z-index:99999;
padding:20px;
overflow:auto;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="panel">
<h3>⚡ SENCI PRO SALITA</h3>

<input id="marca" placeholder="Marca del dispositivo">
<input id="modelo" placeholder="Modelo del dispositivo">

<button onclick="setRango('ALTA')">ALTA</button>
<button onclick="setRango('MEDIA')">MEDIA</button>
<button onclick="setRango('BAJA')">BAJA</button>

<button onclick="activarDrag()" class="dragBtn">🔥 DRAG SHOT PRO</button>

<br>

<button onclick="generar(true)">CON DPI</button>
<button onclick="generar(false)">SIN DPI</button>

<div id="resultado">---</div>
</div>

<div id="vipBtn" onclick="abrirVIP()">VIP</div>

<div id="panelVIP">
<div id="vipResultado"></div>
</div>

<script>
let rango="ALTA";
let dragMode=false;

function setRango(r){
rango=r;
}

/* ACTIVAR DRAG */
function activarDrag(){
dragMode=!dragMode;
alert(dragMode?"🔥 DRAG SHOT ACTIVADO":"❌ DRAG SHOT DESACTIVADO");
}

/* GENERADOR */
function generar(dpi){
let marca=document.getElementById("marca").value;
let modelo=document.getElementById("modelo").value;
let resultado=document.getElementById("resultado");

resultado.innerHTML="⏳ Generando...";

setTimeout(()=>{

let base=modelo.length*3;

let sens={
general:185 + base,
red:150 + base,
x2:135 + base,
x4:125 + base,
boton:58 + base
};

/* RANGO */
if(rango==="ALTA"){
sens.general+=10;
sens.red+=15;
sens.x2+=10;
sens.x4+=8;
sens.boton+=5;
}

if(rango==="BAJA"){
sens.general-=10;
sens.red-=12;
sens.x2-=8;
sens.x4-=6;
sens.boton-=4;
}

/* DPI */
if(dpi){
sens.general+=5;
sens.red+=5;
}

/* DRAG SHOT PRO */
if(dragMode){
sens.general+=15;
sens.red+=25;
sens.x2+=18;
sens.x4+=15;
sens.boton+=8;
}

/* RESULTADO */
resultado.innerHTML=`
<b>📱 ${marca} ${modelo}</b><br>
⚡ ${rango} | ${dpi?"DPI 411":"SIN DPI"} ${dragMode?"🔥 DRAG PRO":""}

<hr>

GENERAL: ${sens.general}<br>

MIRA DE PUNTO ROJO: ${sens.red}<br>

MIRA X2: ${sens.x2}<br>

MIRA X4: ${sens.x4}<br>

MIRA FRANCOTIRADOR: ${sens.x4 + 12}<br>

BOTÓN DE CÁMARA 360°: ${sens.boton}<br>

<hr>

🎯 HEADSHOT PRECISO
`;

},800);
}

/* VIP */
function abrirVIP(){
let u=prompt("Usuario:");
let p=prompt("Clave:");

if(u==="SALITA" && p==="22"){

document.querySelector(".panel").style.display="none";
document.getElementById("vipBtn").style.display="none";

let panelVIP=document.getElementById("panelVIP");
panelVIP.style.display="block";

document.getElementById("vipResultado").innerHTML=`
<h2>💀 MODO VIP EXTREMO 💀</h2>

GENERAL: 200<br>
MIRA DE PUNTO ROJO: 185<br>
MIRA X2: 175<br>
MIRA X4: 165<br>
MIRA FRANCOTIRADOR: 195<br>
BOTÓN 360°: 75<br>

<br>
<button onclick="cerrarVIP()" style="padding:10px;width:100%;">SALIR</button>
`;

}else{
alert("Acceso denegado");
}
}

function cerrarVIP(){
document.getElementById("panelVIP").style.display="none";
document.querySelector(".panel").style.display="block";
document.getElementById("vipBtn").style.display="flex";
}

/* PARTICULAS */
let c=document.getElementById("bg");
let ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let dots=[];

for(let i=0;i<40;i++){
dots.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*2,
dx:Math.random()-0.5,
dy:Math.random()-0.5
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="#00eaff";

dots.forEach(d=>{
ctx.beginPath();
ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
ctx.fill();

d.x+=d.dx;
d.y+=d.dy;

if(d.x<0||d.x>c.width) d.dx*=-1;
if(d.y<0||d.y>c.height) d.dy*=-1;
});

requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
