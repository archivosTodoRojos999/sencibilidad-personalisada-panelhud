<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VIP CONFIG</title>
<style>
    body {
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        width: 300px;
        border: 2px solid yellow;
        padding: 15px;
        border-radius: 10px;
        color: white;
        box-shadow: 0 0 15px yellow;
    }

    h1 {
        text-align: center;
        color: gold;
        margin-bottom: 5px;
    }

    .sub {
        text-align: center;
        font-size: 12px;
        color: red;
        margin-bottom: 15px;
    }

    label {
        font-size: 12px;
        color: #ccc;
    }

    select, input {
        width: 100%;
        padding: 8px;
        margin: 5px 0 10px;
        border: 1px solid red;
        background: #111;
        color: white;
        border-radius: 5px;
    }

    .buttons {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .btn {
        flex: 1;
        margin: 3px;
        padding: 10px;
        text-align: center;
        border: 1px solid red;
        cursor: pointer;
        border-radius: 5px;
    }

    .active {
        background: yellow;
        color: black;
        font-weight: bold;
    }

    .generate {
        margin-top: 10px;
        padding: 10px;
        text-align: center;
        border: 2px solid yellow;
        cursor: pointer;
        border-radius: 5px;
        background: #111;
    }

    .result {
        margin-top: 10px;
        text-align: center;
        font-size: 14px;
        color: cyan;
    }
</style>
</head>
<body>

<div class="container">
    <h1>👑 VIP CONFIG</h1>
    <div class="sub">SYSTEMWOODS PREMIUM • SENSIBILIDAD 0-200</div>

    <label>Selecciona la marca</label>
    <select>
        <option>-- Seleccionar Sistema --</option>
        <option>Samsung</option>
        <option>Xiaomi</option>
        <option>Motorola</option>
        <option>Tecno</option>
    </select>

    <label>Modelo</label>
    <input type="text" placeholder="Escribe tu modelo">

    <label>Calibración de mira</label>
    <div class="buttons">
        <div class="btn active" onclick="selectBtn(this, 'mira')">ALTA</div>
        <div class="btn" onclick="selectBtn(this, 'mira')">MEDIA</div>
        <div class="btn" onclick="selectBtn(this, 'mira')">BAJA</div>
    </div>

    <div class="buttons">
        <div class="btn" onclick="selectBtn(this, 'dpi')">CON DPI</div>
        <div class="btn active" onclick="selectBtn(this, 'dpi')">SIN DPI</div>
    </div>

    <div class="generate" onclick="generar()">GENERAR SENSI</div>

    <div class="result" id="resultado"></div>
</div>

<script>
function selectBtn(element, group) {
    let parent = element.parentElement;
    let buttons = parent.querySelectorAll('.btn');

    buttons.forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
}

function generar() {
    let general = Math.floor(Math.random() * 200);
    let redDot = Math.floor(Math.random() * 200);
    let scope2x = Math.floor(Math.random() * 200);
    let scope4x = Math.floor(Math.random() * 200);

    document.getElementById("resultado").innerHTML = `
        General: ${general} <br>
        Punto rojo: ${redDot} <br>
        2x: ${scope2x} <br>
        4x: ${scope4x}
    `;
}
</script>

</body>
</html>
