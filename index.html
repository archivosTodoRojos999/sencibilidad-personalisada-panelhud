<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cien Pies Interactivo</title>
<style>
  body {
    margin: 0;
    background: #222;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
});

// Variables para el color
let hue = 0;

// Posición del ratón
let mouseX = width/2;
let mouseY = height/2;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// Función para dibujar un "pie grande"
function drawPie(x, y, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color;
  // Dibuja un pie grande (forma simple)
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-50, 20);
  ctx.lineTo(-20, -50);
  ctx.lineTo(20, -50);
  ctx.lineTo(50, 20);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Animación
function animate() {
  ctx.fillStyle = 'rgba(34,34,34,0.2)'; // Fondo con transparencia para efecto de "movimiento"
  ctx.fillRect(0, 0, width, height);

  // Cambiar color del pie
  hue = (hue + 1) % 360;
  const color = `hsl(${hue}, 100%, 50%)`;

  // Dibujar el pie que sigue el mouse
  drawPie(mouseX, mouseY, color);

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
