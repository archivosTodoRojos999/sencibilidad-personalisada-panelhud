<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔒 Sin zoom -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- 📱 MODO APP -->
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.json">

<title>ENDEX UI FINAL</title>

<style>
body {
    margin: 0;
    background: #050505;
    color: #00ffcc;
    font-family: monospace;
    overflow: hidden;
}

/* LOGIN */
#login {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#login input {
    padding: 12px;
    width: 80%;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    font-size: 16px;
}

/* APP */
.container {
    display: none;
    flex-direction: column;
    height: 100vh;
}

/* MENU MOBILE */
.sidebar {
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid #00ffcc33;
}

.menu-item {
    padding: 12px;
    min-width: 90px;
    text-align: center;
    border-right: 1px solid #00ffcc22;
    cursor: pointer;
    font-size: 14px;
}

.menu-item:active {
    background: #00ffcc22;
}

/* MAIN */
.main {
    flex: 1;
    padding: 8px;
    display: flex;
    flex-direction: column;
}

/* TERMINAL */
.terminal {
    flex: 1;
    overflow-y: auto;
    border: 1px solid #00ffcc33;
    padding: 8px;
    font-size: 13px;
}

/* INPUT */
.input-area {
    display: flex;
    margin-top: 5px;
}

input {
    flex: 1;
    background: black;
    border: none;
    color: #00ffcc;
    padding: 12px;
    font-size: 14px;
    outline: none;
}

/* PROGRESS */
.progress {
    height: 6px;
    background: #111;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

/* WINDOW */
.window {
    position: absolute;
    top: 20%;
    left: 10%;
    width: 80%;
    height: 150px;
    background: #000;
    border: 1px solid #00ffcc;
    padding: 10px;
    font-size: 12px;
}

/* RADAR */
.radar {
    width: 140px;
    height: 140px;
    border: 1px solid #00ffcc;
    border-radius: 50%;
    position: relative;
    margin: 10px auto;
}

.line {
    width: 100%;
    height: 2px;
    background: #00ffcc;
    position: absolute;
    top: 50%;
    transform-origin: left;
    animation: rotate 2s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* GLITCH */
.glitch {
    color: #ff00ff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>ENDEX LOGIN</h2>
    <input type="password" id="pass" placeholder="Enter password">
</div>

<!-- APP -->
<div class="container" id="app">

    <div class="sidebar">
        <div class="menu-item" onclick="runScan()">Scan</div>
        <div class="menu-item" onclick="hack()">Hack</div>
        <div class="menu-item" onclick="openWindow()">Window</div>
        <div class="menu-item" onclick="showRadar()">Radar</div>
        <div class="menu-item" onclick="clearTerminal()">Clear</div>
    </div>

    <div class="main">

        <div class="terminal" id="terminal"></div>

        <div class="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Enter command...">
        </div>

        <div id="extra"></div>

    </div>

</div>

<!-- 🔊 AUDIO -->
<audio id="sound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-fast-typing-on-a-keyboard-2546.mp3" type="audio/mpeg">
</audio>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");
const bar = document.getElementById("bar");
const sound = document.getElementById("sound");

/* ACTIVAR AUDIO */
document.body.addEventListener("click", () => {
    sound.play().then(() => {
        sound.pause();
        sound.currentTime = 0;
    }).catch(()=>{});
}, { once: true });

/* LOGIN */
document.getElementById("pass").addEventListener("keydown", e => {
    if (e.key === "Enter") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "flex";
        print("ACCESS GRANTED ✔");
    }
});

/* TERMINAL */
function print(text, glitch=false) {
    let div = document.createElement("div");
    div.textContent = "> " + text;
    if (glitch) div.classList.add("glitch");
    terminal.appendChild(div);
    terminal.scrollTop = terminal.scrollHeight;
}

/* SONIDO */
function typeSound() {
    try {
        let s = sound.cloneNode();
        s.volume = 0.3;
        s.play();
    } catch(e) {}
}

/* INPUT */
input.addEventListener("keydown", e => {

    typeSound();

    if (e.key === "Enter") {
        let cmd = input.value;
        print(cmd);
        execute(cmd);
        input.value = "";
    }
});

/* COMMANDS */
function execute(cmd) {
    typeSound();

    if (cmd === "scan") runScan();
    else if (cmd === "hack") hack();
    else if (cmd === "radar") showRadar();
    else if (cmd === "window") openWindow();
    else if (cmd === "clear") clearTerminal();
    else if (cmd === "help") {
        print("scan | hack | radar | window | clear");
    }
    else print("ERROR: command not found", true);
}

/* FUNCIONES */
function runScan() {
    print("Scanning system...");
    animateBar();
}

function hack() {
    print("Bypassing firewall...");
    setTimeout(() => print("Access granted ✔"), 1500);
    animateBar();
}

function clearTerminal() {
    terminal.innerHTML = "";
}

function animateBar() {
    bar.style.width = "0%";
    let progress = 0;

    let interval = setInterval(() => {
        progress += 4;
        bar.style.width = progress + "%";

        if (progress >= 100) {
            clearInterval(interval);
            print("Process completed ✔");
        }
    }, 100);
}

function openWindow() {
    let win = document.createElement("div");
    win.className = "window";
    win.innerHTML = "SYSTEM LOG<br>Accessing data...";
    document.body.appendChild(win);
}

function showRadar() {
    let radar = document.createElement("div");
    radar.className = "radar";

    let line = document.createElement("div");
    line.className = "line";

    radar.appendChild(line);
    document.getElementById("extra").appendChild(radar);
}

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

/* START */
print("ENDEX_UI FINAL READY");
print("Type 'help'");
</script>

</body>
</html>
