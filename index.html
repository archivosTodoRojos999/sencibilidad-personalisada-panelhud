<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VIP CONFIG</title>
<style>
    body {
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        width: 300px;
        border: 2px solid yellow;
        padding: 15px;
        border-radius: 10px;
        color: white;
        box-shadow: 0 0 15px yellow;
    }

    h1 {
        text-align: center;
        color: gold;
        margin-bottom: 5px;
    }

    .sub {
        text-align: center;
        font-size: 12px;
        color: red;
        margin-bottom: 15px;
    }

    label {
        font-size: 12px;
        color: #ccc;
    }

    select, input {
        width: 100%;
        padding: 8px;
        margin: 5px 0 10px;
        border: 1px solid red;
        background: #111;
        color: white;
        border-radius: 5px;
    }

    .buttons {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .btn {
        flex: 1;
        margin: 3px;
        padding: 10px;
        text-align: center;
        border: 1px solid red;
        cursor: pointer;
        border-radius: 5px;
    }

    .active {
        background: yellow;
        color: black;
        font-weight: bold;
    }

    .generate {
        margin-top: 10px;
        padding: 10px;
        text-align: center;
        border: 2px solid yellow;
        cursor: pointer;
        border-radius: 5px;
        background: #111;
    }

    .result {
        margin-top: 10px;
        text-align: center;
        font-size: 14px;
        color: cyan;
    }
</style>
</head>
<body>

<div class="container">
    <h1>👑 VIP CONFIG</h1>
    <div class="sub">SYSTEMWOODS PREMIUM • SENSIBILIDAD 0-200</div>

    <label>Selecciona la marca</label>
    <select>
        <option>-- Seleccionar Sistema --</option>
        <option>Samsung</option>
        <option>Xiaomi</option>
        <option>Motorola</option>
        <option>Tecno</option>
    </select>

    <label>Modelo</label>
    <input type="text" placeholder="Escribe tu modelo">

    <label>Calibración de mira</label>
    <div class="buttons">
        <div class="btn active" onclick="selectBtn(this, 'mira')">ALTA</div>
        <div class="btn" onclick="selectBtn(this, 'mira')">MEDIA</div>
        <div class="btn" onclick="selectBtn(this, 'mira')">BAJA</div>
    </div>

    <div class="buttons">
        <div class="btn" onclick="selectBtn(this, 'dpi')">CON DPI</div>
        <div class="btn active" onclick="selectBtn(this, 'dpi')">SIN DPI</div>
    </div>

    <div class="generate" onclick="generar()">GENERAR SENSI</div>

    <div class="result" id="resultado"></div>
</div>

<script>
function selectBtn(element, group) {
    let parent = element.parentElement;
    let buttons = parent.querySelectorAll('.btn');

    buttons.forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
}

function generar() {

    let marca = document.querySelector("select").value.toLowerCase();
    let modelo = document.querySelector("input").value.toLowerCase();

    let mira = document.querySelectorAll('.buttons')[0].querySelector('.active').innerText;
    let dpi = document.querySelectorAll('.buttons')[1].querySelector('.active').innerText;

    let base = 100;

    // 🔥 Ajuste por marca
    if (marca.includes("samsung")) base = 120;
    else if (marca.includes("xiaomi")) base = 110;
    else if (marca.includes("motorola")) base = 105;
    else if (marca.includes("tecno")) base = 115;

    // 📱 Ajuste por modelo
    if (modelo.includes("a") || modelo.includes("note") || modelo.includes("redmi")) base += 5;
    if (modelo.includes("pro") || modelo.includes("plus")) base += 8;
    if (modelo.includes("lite") || modelo.includes("go")) base -= 5;

    // 🎯 Calibración de mira
    if (mira === "ALTA") base += 30;
    if (mira === "MEDIA") base += 10;
    if (mira === "BAJA") base -= 10;

    // ⚡ DPI
    if (dpi === "CON DPI") base += 12;
    if (dpi === "SIN DPI") base -= 5;

    // 🎮 Generador con micro-ajustes
    function rango(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function microAjuste(valor) {
        return valor + Math.floor(Math.random() * 3) - 1;
    }

    let general = microAjuste(rango(base - 3, base + 3));
    let redDot = microAjuste(rango(base + 8, base + 12));
    let scope2x = microAjuste(rango(base - 5, base));
    let scope4x = microAjuste(rango(base - 15, base - 8));
    let sniper = microAjuste(rango(base - 35, base - 25));
    let camara = microAjuste(rango(base + 12, base + 20));

    // 🔒 Estabilidad (anti-retroceso simulado)
    if (mira === "ALTA") {
        redDot += 2;
        scope2x += 1;
    }

    if (dpi === "CON DPI") {
        general += 2;
        camara += 2;
    }

    // 🧠 Normalización
    function limitar(valor) {
        return Math.max(0, Math.min(200, valor));
    }

    general = limitar(general);
    redDot = limitar(redDot);
    scope2x = limitar(scope2x);
    scope4x = limitar(scope4x);
    sniper = limitar(sniper);
    camara = limitar(camara);

    document.getElementById("resultado").innerHTML = `
        <b>AJUSTES DE SENCI (ULTRA PRECISIÓN)</b><br><br>
        📱 Dispositivo: ${marca.toUpperCase()} ${modelo} <br>
        🎯 Modo: ${mira} <br>
        ⚙️ DPI: ${dpi} <br><br>

        GENERAL: ${general} <br>
        MIRA DE PUNTO ROJO: ${redDot} <br>
        MIRA 2X: ${scope2x} <br>
        MIRA 4X: ${scope4x} <br>
        MIRA FRANCOTIRADOR: ${sniper} <br>
        BOTÓN DE CÁMARA 360°: ${camara}
    `;
}
</script>

</body>
</html>
