
<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENCI DE SALITA 2.0</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:white;
position:relative;
overflow-x:hidden;
word-wrap:break-word;
}

*{
box-sizing:border-box;
}

body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:radial-gradient(circle at 20% 30%, rgba(255,0,0,0.2), transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(255,50,50,0.2), transparent 40%),
            radial-gradient(circle at 50% 50%, rgba(255,0,0,0.1), transparent 60%),
            linear-gradient(120deg,#000,#0a0000,#000);
animation:fondoMove 10s infinite alternate ease-in-out;
z-index:-1;
}

@keyframes fondoMove{
0%{background-position:0% 50%,100% 50%,50% 50%,0 0;}
50%{background-position:50% 0%,50% 100%,50% 50%,0 0;}
100%{background-position:100% 50%,0% 50%,50% 50%,0 0;}
}

.container{max-width:420px;margin:auto;padding:15px;}
h1{color:#ff2a2a;font-size:22px;text-align:center;}

.tabs{display:flex;background:#111;border-radius:25px;overflow:hidden;margin:15px 0;}
.tab{flex:1;padding:12px;text-align:center;color:#777;cursor:pointer;}
.tab.active{background:#ff2a2a;color:#fff;border-radius:25px;}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
text-align:center;
}

.box{
background:#120000;
border:1px solid #ff2a2a;
border-radius:20px;
padding:15px;
}

.titulo{
font-weight:bold;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

.pill{
background:#2a0000;
padding:5px 10px;
border-radius:20px;
color:#ff2a2a;
font-size:12px;
}

.row{margin:15px 0;}

.label{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.label span{
max-width:60px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

input[type=range]{
width:100%;
pointer-events:none;
opacity:0.6;
}

.bottom{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.bottomBox{
width:48%;
background:#120000;
border:1px solid #ff2a2a;
border-radius:15px;
padding:15px;
text-align:center;
}

.valor{
color:#ff2a2a;
font-size:26px;
}

.footer{
text-align:center;
margin-top:10px;
color:#777;
font-size:12px;
}

.flash{
animation:flashAnim 0.5s ease;
}

@keyframes flashAnim{
0%{box-shadow:0 0 10px #ff2a2a;}
50%{box-shadow:0 0 30px #ff0000;}
100%{box-shadow:0 0 10px #ff2a2a;}
}
</style>
</head>

<body>

<div class="container">
<h1>SENCI DE SALITA 2.0 </h1>

<div class="tabs">
<div class="tab active" onclick="setTab(this,'normal')">SENSI NORMAL</div>
<div class="tab" onclick="setTab(this,'premium')">SENSI ALTA</div>
<div class="tab" onclick="setTab(this,'inspirada')">SENSI MEDIA</div>
</div>

<input id="marca" placeholder="Marca del dispositivo" oninput="calcular()">
<input id="modelo" placeholder="Modelo del dispositivo" oninput="calcular()">

<div class="box">

<div class="titulo">
<span>SENSIBILIDAD</span>
<span class="pill" id="tipo">NORMAL</span>
</div>

<div class="row">
<div class="label">GENERAL <span id="general">150</span></div>
<input type="range" min="1" max="200" value="150" disabled>
</div>

<div class="row">
<div class="label">MIRA DE PUNTO ROJO <span id="red">130</span></div>
<input type="range" min="1" max="200" value="130" disabled>
</div>

<div class="row">
<div class="label">MIRA 2X <span id="x2">120</span></div>
<input type="range" min="1" max="200" value="120" disabled>
</div>

<div class="row">
<div class="label">MIRA 4X <span id="x4">110</span></div>
<input type="range" min="1" max="200" value="110" disabled>
</div>

<div class="row">
<div class="label">MIRA FRANCOTIRADOR <span id="awm">125</span></div>
<input type="range" min="1" max="200" value="125" disabled>
</div>

<div class="row">
<div class="label">BOTON DE CAMARA 360º <span id="boton">50</span></div>
<input type="range" min="1" max="100" value="50" disabled>
</div>

</div>

<div class="bottom">
<div class="bottomBox">
<div class="valor" id="btnSize">50</div>
<div>TAM. BOTON</div>
</div>

<div class="bottomBox">
<div class="valor" id="dpi">400</div>
<div>DPI</div>
</div>
</div>

<div class="footer">SENSI AUTOMATICA CALIBRADA</div>
</div>

<script>
let tipoActual="normal";

function setTab(btn,tipo){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
tipoActual=tipo;
document.getElementById('tipo').innerText=tipo.toUpperCase();
calcular();
}

function update(id,val){
// bloqueado
}

function calcular(){
let marca=document.getElementById('marca').value||"";
let modelo=document.getElementById('modelo').value||"";
let texto=marca+modelo;

let base=0;
for(let i=0;i<texto.length;i++){
base+=texto.charCodeAt(i)*(i+1);
}

base=(base%60)+10;

let mult=1;
let textoLower = texto.toLowerCase();
let gama="media";

if(textoLower.includes("pro")||textoLower.includes("ultra")||textoLower.includes("iphone")) gama="alta";
else if(textoLower.includes("lite")||textoLower.includes("a")) gama="baja";

if(gama==="alta") mult+=0.10;
if(gama==="baja") mult-=0.05;

if(tipoActual==="premium") mult=1.20;
if(tipoActual==="inspirada") mult=0.90;

let micro=(texto.length*5)%10;

let sens={
general:Math.floor((140+base+micro)*mult),
red:Math.floor((120+base+micro)*mult),
x2:Math.floor((90+base)*mult),
x4:Math.floor((170+base+micro)*mult),
awm:Math.floor((110+base+micro)*mult),
boton:Math.floor((60+base)*mult)
};

function suavizar(v){return Math.floor((v*0.96)+1);}
for(let k in sens){sens[k]=suavizar(sens[k]);}

function limitar(v,max){return Math.max(1,Math.min(v,max));}

sens.general=limitar(sens.general,200);
sens.red=limitar(sens.red,200);
sens.x2=limitar(sens.x2,200);
sens.x4=limitar(sens.x4,200);
sens.awm=limitar(sens.awm,200);
sens.boton=limitar(sens.boton,100);

for(let k in sens){
if(document.getElementById(k)) document.getElementById(k).innerText=sens[k];
}

document.getElementById('btnSize').innerText=sens.boton;

let dpiFinal=350+(base*3);
dpiFinal=Math.max(350,Math.min(dpiFinal,600));
document.getElementById('dpi').innerText=dpiFinal;
}
</script>

</body>
</html>
