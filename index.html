<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Military Cyber System</title>

<style>

body{
margin:0;
background:black;
color:#00ff9c;
font-family:monospace;
overflow:hidden;
}

/* LOGIN */

#login{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:10;
}

input{
background:black;
border:2px solid #00ff9c;
color:#00ff9c;
padding:10px;
font-size:20px;
text-align:center;
}

button{
background:black;
border:2px solid #00ff9c;
color:#00ff9c;
padding:10px 20px;
margin-top:10px;
cursor:pointer;
font-family:monospace;
}

button:hover{
background:#00ff9c;
color:black;
}

/* MATRIX */

canvas{
position:absolute;
top:0;
left:0;
}

/* TERMINALES */

#terminal{
position:absolute;
bottom:20px;
left:20px;
width:45%;
font-size:18px;
}

#terminal2{
position:absolute;
bottom:20px;
right:20px;
width:45%;
font-size:18px;
}

/* PASSWORD CRACK */

#passwords{
position:absolute;
top:20px;
left:20px;
font-size:16px;
color:#00ffaa;
}

/* MAPA */

#map{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:0.3;
background-image:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");
background-size:cover;
}

/* POINTS */

.point{
position:absolute;
width:6px;
height:6px;
background:#00ff9c;
border-radius:50%;
box-shadow:0 0 10px #00ff9c;
}

/* LINES */

.hackLine{
position:absolute;
height:2px;
background:#00ff9c;
box-shadow:0 0 10px #00ff9c;
}

/* SATELLITES */

.satellite{
position:absolute;
width:8px;
height:8px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white;
}

/* ACCESS PANEL */

#panel{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
text-align:center;
padding-top:20vh;
font-size:40px;
}

/* CONTROL ROOM */

#controlRoom{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
}

/* CAMERAS */

.camera{
position:absolute;
border:2px solid #00ff9c;
width:30%;
height:25%;
}

#cam1{top:5%;left:5%}
#cam2{top:5%;right:5%}
#cam3{bottom:5%;left:5%}
#cam4{bottom:5%;right:5%}

/* MISSILE PANEL */

#missilePanel{
position:absolute;
top:35%;
left:35%;
width:30%;
text-align:center;
}

</style>
</head>

<body>

<div id="login">
<h2>ENTER ACCESS CODE</h2>
<input id="codeInput" placeholder="Access code">
<button onclick="checkCode()">ENTER</button>
</div>

<canvas id="matrix"></canvas>

<div id="passwords"></div>

<div id="terminal"></div>
<div id="terminal2"></div>

<div id="map"></div>

<div id="panel">
⚠ ACCESS GRANTED ⚠
<br>
Opening Command Center...
</div>

<div id="controlRoom">

<div class="camera" id="cam1">CAMERA 01</div>
<div class="camera" id="cam2">CAMERA 02</div>
<div class="camera" id="cam3">CAMERA 03</div>
<div class="camera" id="cam4">CAMERA 04</div>

<div id="missilePanel">
<h2>GLOBAL DEFENSE</h2>
<button onclick="fakeLaunch()">LAUNCH</button>
<button onclick="fakeLaunch()">ARM</button>
<button onclick="fakeLaunch()">LOCK TARGET</button>
<p id="status"></p>
</div>

</div>

<script>

/* LOGIN */

function checkCode(){

let code=document.getElementById("codeInput").value

if(code==="999"){

document.getElementById("login").style.display="none"
startSystem()

}else{

alert("ACCESS DENIED")

}

}

/* MATRIX */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&"
const fontSize=16
const columns=canvas.width/fontSize
const drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff9c"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0

drops[i]++

}

}

setInterval(draw,35)

/* TERMINAL */

function startSystem(){

typeLine()
setInterval(showPasswords,200)

setTimeout(startMap,8000)

}

/* TERMINAL TEXT */

const terminal=document.getElementById("terminal")

const lines=[
"Connecting to remote server...",
"Bypassing firewall...",
"Decrypting system...",
"Accessing database...",
"Downloading files..."
]

let lineIndex=0
let charIndex=0

function typeLine(){

if(lineIndex>=lines.length) return

let current=lines[lineIndex]

terminal.innerHTML+=current.charAt(charIndex)

charIndex++

if(charIndex<current.length){

setTimeout(typeLine,40)

}else{

terminal.innerHTML+="<br>"
lineIndex++
charIndex=0
setTimeout(typeLine,500)

}

}

/* PASSWORD CRACK */

const passwords=document.getElementById("passwords")

function showPasswords(){

let chars="abcdefghijklmnopqrstuvwxyz0123456789"

let pass=""

for(let i=0;i<8;i++){

pass+=chars[Math.floor(Math.random()*chars.length)]

}

passwords.innerHTML="CRACKING PASSWORD: "+pass

}

/* IP CONNECTIONS */

const terminal2=document.getElementById("terminal2")

function randomIP(){

return Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255)

}

setInterval(()=>{

terminal2.innerHTML+="Connected: "+randomIP()+"<br>"

if(terminal2.innerHTML.length>2000) terminal2.innerHTML=""

},600)

/* MAP */

function startMap(){

document.getElementById("map").style.display="block"

for(let i=0;i<30;i++){

let p=document.createElement("div")
p.className="point"

p.style.left=Math.random()*100+"%"
p.style.top=Math.random()*100+"%"

document.body.appendChild(p)

}

setInterval(createHackLine,800)

for(let i=0;i<5;i++) createSatellite()

setTimeout(()=>{

document.getElementById("panel").style.display="block"

setTimeout(()=>{
document.getElementById("controlRoom").style.display="block"
},3000)

},5000)

}

/* HACK LINES */

function createHackLine(){

let line=document.createElement("div")
line.className="hackLine"

let x1=Math.random()*window.innerWidth
let y1=Math.random()*window.innerHeight
let x2=Math.random()*window.innerWidth
let y2=Math.random()*window.innerHeight

let length=Math.hypot(x2-x1,y2-y1)
let angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI

line.style.width=length+"px"
line.style.left=x1+"px"
line.style.top=y1+"px"
line.style.transform="rotate("+angle+"deg)"

document.body.appendChild(line)

setTimeout(()=>line.remove(),2000)

}

/* SATELLITES */

function createSatellite(){

let sat=document.createElement("div")
sat.className="satellite"

document.body.appendChild(sat)

let angle=0
let radius=300+Math.random()*200

function move(){

angle+=0.01

let x=window.innerWidth/2+Math.cos(angle)*radius
let y=window.innerHeight/2+Math.sin(angle)*radius

sat.style.left=x+"px"
sat.style.top=y+"px"

requestAnimationFrame(move)

}

move()

}

/* BUTTON */

function fakeLaunch(){

document.getElementById("status").innerText="SYSTEM READY (SIMULATION)"

}

</script>

</body>
</html>
