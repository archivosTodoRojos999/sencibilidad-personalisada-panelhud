<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tetris en Verde</title>
<style>
  body {
    background: #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    font-family: Arial, sans-serif;
    color: #fff;
  }
  h1 {
    margin: 10px;
  }
  canvas {
    background: #111;
    border: 2px solid #0f0;
    display: block;
  }
  #score {
    margin: 10px;
    font-size: 1.2em;
  }
</style>
</head>
<body>
<h1>Tetris en Verde</h1>
<div id="score">Puntos: 0</div>
<canvas id="tetris" width="240" height="400"></canvas>

<script>
const canvas = document.getElementById('tetris');
const ctx = canvas.getContext('2d');

const ROWS = 20;
const COLS = 10;
const BLOCK_SIZE = 20;

let score = 0;
let board = [];
let currentPiece;
let gameInterval;
let gameOver = false;

// Piezas Tetris
const shapes = [
  // Cuadrado
  [[1,1],
   [1,1]],
  // L
  [[1,0],
   [1,0],
   [1,1]],
  // J
  [[0,1],
   [0,1],
   [1,1]],
  // T
  [[1,1,1],
   [0,1,0]],
  // S
  [[0,1,1],
   [1,1,0]],
  // Z
  [[1,1,0],
   [0,1,1]],
  // Línea
  [[1],
   [1],
   [1],
   [1]]
];

function init() {
  // Crear tablero
  for(let r=0; r<ROWS; r++) {
    board[r] = [];
    for(let c=0; c<COLS; c++) {
      board[r][c] = 0;
    }
  }
  spawnPiece();
  document.addEventListener('keydown', handleKey);
  gameInterval = setInterval(update, 500);
}

function spawnPiece() {
  const shape = shapes[Math.floor(Math.random() * shapes.length)];
  currentPiece = {
    shape: shape,
    row: 0,
    col: Math.floor(COLS/2) - Math.ceil(shape[0].length/2)
  };
  if (collision(currentPiece.shape, currentPiece.row, currentPiece.col)) {
    clearInterval(gameInterval);
    alert('¡Juego terminado!');
    gameOver = true;
  }
}

function collision(shape, row, col) {
  for(let r=0; r<shape.length; r++) {
    for(let c=0; c<shape[r].length; c++) {
      if(shape[r][c]) {
        let newRow = row + r;
        let newCol = col + c;
        if(newRow >= ROWS || newCol < 0 || newCol >= COLS || board[newRow][newCol]) {
          return true;
        }
      }
    }
  }
  return false;
}

function merge() {
  for(let r=0; r<currentPiece.shape.length; r++) {
    for(let c=0; c<currentPiece.shape[r].length; c++) {
      if(currentPiece.shape[r][c]) {
        board[currentPiece.row + r][currentPiece.col + c] = 1;
      }
    }
  }
  clearLines();
  spawnPiece();
}

function clearLines() {
  for(let r=ROWS-1; r>=0; r--) {
    if(board[r].every(c => c === 1)) {
      board.splice(r,1);
      board.unshift(new Array(COLS).fill(0));
      score += 100;
      document.getElementById('score').innerText = 'Puntos: ' + score;
    }
  }
}

function handleKey(e) {
  if(gameOver) return;
  if(e.key === 'ArrowLeft') {
    if(!collision(currentPiece.shape, currentPiece.row, currentPiece.col -1))
      currentPiece.col--;
  } else if(e.key === 'ArrowRight') {
    if(!collision(currentPiece.shape, currentPiece.row, currentPiece.col +1))
      currentPiece.col++;
  } else if(e.key === 'ArrowDown') {
    if(!collision(currentPiece.shape, currentPiece.row +1, currentPiece.col))
      currentPiece.row++;
    else {
      merge();
    }
  } else if(e.key === 'ArrowUp') {
    // rotar
    const rotated = rotate(currentPiece.shape);
    if(!collision(rotated, currentPiece.row, currentPiece.col))
      currentPiece.shape = rotated;
  }
  draw();
}

function rotate(shape) {
  const rows = shape.length;
  const cols = shape[0].length;
  const newShape = [];
  for(let c=0; c<cols; c++) {
    newShape[c] = [];
    for(let r=rows-1; r>=0; r--) {
      newShape[c][rows-1-r] = shape[r][c];
    }
  }
  return newShape;
}

function update() {
  if(gameOver) return;
  if(!collision(currentPiece.shape, currentPiece.row +1, currentPiece.col))
    currentPiece.row++;
  else {
    merge();
  }
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // dibujar tablero
  for(let r=0; r<ROWS; r++) {
    for(let c=0; c<COLS; c++) {
      if(board[r][c]) {
        ctx.fillStyle = 'green';
        ctx.fillRect(c*BLOCK_SIZE, r*BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        ctx.strokeStyle='black';
        ctx.strokeRect(c*BLOCK_SIZE, r*BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
      }
    }
  }
  // dibujar pieza actual
  for(let r=0; r<currentPiece.shape.length; r++) {
    for(let c=0; c<currentPiece.shape[r].length; c++) {
      if(currentPiece.shape[r][c]) {
        ctx.fillStyle='green';
        ctx.fillRect((currentPiece.col + c)*BLOCK_SIZE, (currentPiece.row + r)*BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        ctx.strokeStyle='black';
        ctx.strokeRect((currentPiece.col + c)*BLOCK_SIZE, (currentPiece.row + r)*BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
      }
    }
  }
}

init();
</script>
</body>
</html>
